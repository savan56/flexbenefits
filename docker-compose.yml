version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: flexbenefits
      POSTGRES_USER: flexuser
      POSTGRES_PASSWORD: flexpass
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: