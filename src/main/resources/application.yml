spring:
  application:
    name: flexbenefits
  datasource:
    url: jdbc:postgresql://localhost:5432/flexbenefits
    username: flexuser
    password: flexpass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enable: true
    locations: classpath:db/migration

management:
  endpoint:
    web:
      exposure:
        include: health,info,metrics
    info:
      env:
        enabled: true

info:
  app:
    name: FlexBenefits
    description: Multi-tenant benefit & claim platform
    version: 0.1.0

server:
  port: 8080
