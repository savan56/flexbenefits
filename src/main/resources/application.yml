spring:
  application:
    name: flexbenefits

# Datasource
  datasource:
    url: jdbc:postgresql://localhost:5432/flexbenefits
    username: flexuser
    password: flexpass

#JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

# Flayway
  flyway:
    enable: true
    locations: classpath:db/migration

#Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  info:
    env:
      enabled: true

#App Info
info:
  app:
    name: FlexBenefits
    description: Multi-tenant benefit & claim platform
    version: 0.1.0

server:
  port: 8080

#JWT
jwt:
  secret: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBmbGV4YmVuZWZpdHMgand0IHNpZ25pbmc=
  expiration: 86400000 # example for 24 hours in milliseconds

